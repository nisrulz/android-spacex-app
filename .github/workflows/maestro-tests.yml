name: Maestro Android Tests

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "repo_assets/**"
      - "LICENSE"
      - ".gitignore"
  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  # Limit concurrency to 1 for PRs. 'main' concurrency isn't limited.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions: # Specify the required permissions
      issues: write # For writing comments on issues and pull requests
      pull-requests: write # For interacting with pull request data
    steps:
      - name: Checkout code at the latest commit in branch
        id: checkout-code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Setup and validate gradle wrapper
        # Will automatically perform wrapper validation on each execution.
        uses: gradle/actions/setup-gradle@v6
        timeout-minutes: 5

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Cache Maestro CLI
        uses: actions/cache@v5
        with:
          path: ~/.maestro
          key: ${{ runner.os }}-maestro-${{ hashFiles('scripts/setup_maestro.sh') }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: api-server/go.sum

      - name: Build and start API server
        run: |
          cd api-server
          go build -o spacex-api-server .
          ./spacex-api-server &
          echo "Waiting for API server to be ready..."
          for i in $(seq 1 15); do
            if curl -skf https://localhost:8443/healthz > /dev/null 2>&1; then
              echo "API server ready"
              break
            fi
            echo "  attempt $i/15..."
            sleep 1
          done

      - name: Build debug APK before starting emulator
        run: |
          adb reverse tcp:8443 tcp:8443
          ./gradlew assembleDebug -PAPI_BASE_URL=https://localhost:8443/

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_6_pro
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          emulator-boot-timeout: 600
          disable-animations: true
          script: |
            ./scripts/setup_maestro.sh
            ./scripts/install_app.sh
            ./scripts/run_maestro.sh

      - name: Create comment with test results
        uses: actions/github-script@v9
        if: always() && github.event_name == 'pull_request' && hashFiles('test_results.txt') != ''
        with:
          script: |
            const fs = require('fs');
            const pr_number = context.payload.pull_request.number;

            // Read test results from file
            const testResults = fs.readFileSync('./test_results.txt', 'utf-8');

            // Create comment in the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body: `### Maestro Test Results\n${testResults}`
            });
