name: Build APK for labeled PR

env:
  MAIN_PROJECT_MODULE: "app"
  JAVA_VERSION: "17"

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
    branches:
      - main

jobs:
  build-and-upload-apk:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'Build APK') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code at the latest commit in branch
        id: checkout-code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Cache Gradle and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        id: upload-apk
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Comment in PR
        env:
          URL: ${{ github.event.pull_request.comments_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_LINK: https://github.com/${GITHUB_actor}/${GITHUB_repository}/pull/${GITHUB_PR_ID}
        run: |
          curl -X POST $URL -H "Content-Type: application/json" -H "Authorization: token $GITHUB_TOKEN" \\\\
            --data '{"body": "Build Successful! APK uploaded to artifacts. [Check it out]($APK_LINK)" }'