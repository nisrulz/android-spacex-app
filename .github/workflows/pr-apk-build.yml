name: Build APK for labeled PR

env:
  main_project_module: app

on:
  # Allows to run this workflow when a Pull Request is made with the set target branch
  pull_request:
    paths-ignore:
      - "**/*.md"
    branches:
      - main
  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-upload-apk-and-comment-on-pr:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'Build APK') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code at the latest commit in branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7  # Retain the artifact for 7 days

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          path: app-release.apk
          comment: "Build Successful! APK uploaded to artifacts.
            [Check it out](https://github.com/{GITHUB_actor}/{GITHUB_repository}/actions/runs/{GITHUB_RUN_ID})"